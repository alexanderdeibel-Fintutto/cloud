name: SecondBrain Gmail Sync

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Gmail-Suchanfrage"
        required: false
        default: "has:attachment filename:pdf -in:spam -in:trash newer_than:30d"
      max_results:
        description: "Maximale Anzahl E-Mails"
        required: false
        default: "50"

jobs:
  sync:
    name: Gmail to Supabase Storage Sync
    runs-on: ubuntu-latest
    steps:
      - name: Gmail-Sync ausfuehren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SECONDBRAIN_USER_ID: ${{ secrets.SECONDBRAIN_USER_ID }}
          GMAIL_OAUTH_TOKEN: ${{ secrets.GMAIL_OAUTH_TOKEN }}
          QUERY: ${{ github.event.inputs.query || 'has:attachment filename:pdf -in:spam -in:trash newer_than:30d' }}
          MAX_RESULTS: ${{ github.event.inputs.max_results || '50' }}
        run: |
          if [ -z "$GMAIL_OAUTH_TOKEN" ] || [ -z "$SUPABASE_URL" ]; then
            echo "::warning::Fehlende Secrets - Gmail-Sync wird uebersprungen"
            echo "## Gmail-Sync uebersprungen" >> $GITHUB_STEP_SUMMARY
            echo "Fehlende Secrets: GMAIL_OAUTH_TOKEN oder SUPABASE_URL nicht konfiguriert." >> $GITHUB_STEP_SUMMARY
            echo "Bitte GMAIL_OAUTH_TOKEN als GitHub Secret eintragen." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/gmail-sync" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "X-Gmail-Token: ${GMAIL_OAUTH_TOKEN}" \
            -d "{\"user_id\": \"${SECONDBRAIN_USER_ID}\", \"query\": \"${QUERY}\", \"max_results\": ${MAX_RESULTS}}")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Gmail-Sync fehlgeschlagen mit Status $HTTP_STATUS"
            echo "Response: $BODY"
            exit 1
          fi

          PROCESSED=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('processed', 0))" 2>/dev/null || echo "?")
          SKIPPED=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('skipped', 0))" 2>/dev/null || echo "?")
          ERRORS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('errors', 0))" 2>/dev/null || echo "?")

          echo "## Gmail-Sync Ergebnis" >> $GITHUB_STEP_SUMMARY
          echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Verarbeitet | $PROCESSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Uebersprungen | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| Fehler | $ERRORS |" >> $GITHUB_STEP_SUMMARY
