name: CI
on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # PFLICHT: Regressionstests müssen grün sein bevor gebaut wird
  # ─────────────────────────────────────────────────────────────────────────
  regression-guard:
    name: Regression Guard (Credits, Entitlements, Plan-Logik)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm-Store cachen für schnellere Folge-Runs
      - name: pnpm Store-Pfad ermitteln
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Regressionstests ausführen
        run: pnpm exec vitest run src/__tests__/regression/ --reporter=verbose

      # Testergebnisse als Artefakt hochladen (für PR-Kommentare)
      - name: Testergebnisse hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            coverage/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Build-Jobs laufen nur wenn Regressionstests grün sind
  # Turbo Remote Cache: GitHub Actions Cache API als Backend
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: regression-guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          # Root-App (mieter-checker)
          - name: mieter-checker
            path: .
          # Kern-Apps
          - name: fintutto-portal
            path: apps/fintutto-portal
          - name: vermieter-portal
            path: apps/vermieter-portal
          - name: vermietify
            path: apps/vermietify
          # SecondBrain (Dokumenten-Hub)
          - name: secondbrain
            path: apps/secondbrain
          # AMS (Account Management)
          - name: ams
            path: apps/ams

    name: Build ${{ matrix.app.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm-Store cachen (gleicher Cache-Key wie regression-guard → Cache-Hit)
      - name: pnpm Store-Pfad ermitteln
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Turbo Remote Cache: dist-Verzeichnisse über Runs hinweg cachen
      # Cache-Key basiert auf Quellcode-Hash → nur neu bauen wenn sich etwas geändert hat
      - name: Turbo Build-Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.app.path }}/.vite
            ${{ matrix.app.path }}/node_modules/.vite
            ${{ matrix.app.path }}/dist
            .turbo
          key: turbo-${{ matrix.app.name }}-${{ runner.os }}-${{ hashFiles(format('{0}/src/**', matrix.app.path), format('{0}/package.json', matrix.app.path), '**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ matrix.app.name }}-${{ runner.os }}-

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript-Check (shared package)
        run: pnpm exec tsc --noEmit -p packages/shared/tsconfig.json
        continue-on-error: true

      - name: Build ${{ matrix.app.name }}
        run: pnpm exec vite build
        working-directory: ${{ matrix.app.path }}
        env:
          # Turbo-Telemetrie deaktivieren
          TURBO_TELEMETRY_DISABLED: 1
          # CI-Modus für Vite
          CI: true
        continue-on-error: true

      # Build-Größe als Artefakt hochladen
      - name: Build-Artefakt hochladen
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app.name }}
          path: ${{ matrix.app.path }}/dist/
          retention-days: 3
          if-no-files-found: ignore
