# =============================================================================
# Fintutto Container — Nginx Routing
# Routes requests to the correct app based on URL path
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # -------------------------------------------------------------------------
    # Health check endpoint
    # -------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 '{"status":"ok","apps":["fintutto","vermietify","mieter-portal","hausmeister-pro","zaehler-app","bescheid-boxer"]}';
        add_header Content-Type application/json;
    }

    # -------------------------------------------------------------------------
    # Landing Page / App Selector
    # -------------------------------------------------------------------------
    location = / {
        try_files /index.html =404;
    }

    # -------------------------------------------------------------------------
    # Fintutto Full (Main Hub) — /fintutto
    # -------------------------------------------------------------------------
    location /fintutto {
        alias /usr/share/nginx/html/fintutto;
        try_files $uri $uri/ /fintutto/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/fintutto;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # Vermietify — /vermietify
    # -------------------------------------------------------------------------
    location /vermietify {
        alias /usr/share/nginx/html/vermietify;
        try_files $uri $uri/ /vermietify/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/vermietify;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # Mieter-Portal — /mieter-portal
    # -------------------------------------------------------------------------
    location /mieter-portal {
        alias /usr/share/nginx/html/mieter-portal;
        try_files $uri $uri/ /mieter-portal/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/mieter-portal;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # HausmeisterPro — /hausmeister-pro
    # -------------------------------------------------------------------------
    location /hausmeister-pro {
        alias /usr/share/nginx/html/hausmeister-pro;
        try_files $uri $uri/ /hausmeister-pro/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/hausmeister-pro;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # ZählerApp — /zaehler-app
    # -------------------------------------------------------------------------
    location /zaehler-app {
        alias /usr/share/nginx/html/zaehler-app;
        try_files $uri $uri/ /zaehler-app/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/zaehler-app;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # BescheidBoxer — /bescheid-boxer
    # -------------------------------------------------------------------------
    location /bescheid-boxer {
        alias /usr/share/nginx/html/bescheid-boxer;
        try_files $uri $uri/ /bescheid-boxer/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/bescheid-boxer;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------------------------
    # Error pages
    # -------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
