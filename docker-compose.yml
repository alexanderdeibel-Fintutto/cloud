  # ---------------------------------------------------------------------------
  # BescheidBoxer — Port 3104
  # ---------------------------------------------------------------------------
  bescheid-boxer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bescheid-boxer-app
    ports:
